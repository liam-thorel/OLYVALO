<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <defs>
    <style>
      .wheel { transform-origin: 100px 100px; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .wheel { animation: spin 12s linear infinite; }
    </style>
  </defs>

  <!-- Support legs -->
  <line x1="100" y1="188" x2="55" y2="215" stroke="#ff4656" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="188" x2="145" y2="215" stroke="#ff4656" stroke-width="4" stroke-linecap="round"/>
  <line x1="55" y1="215" x2="145" y2="215" stroke="#a87fff" stroke-width="3" stroke-linecap="round"/>

  <g class="wheel">
    <!-- Outer ring -->
    <circle cx="100" cy="100" r="88" fill="none" stroke="#ff4656" stroke-width="4"/>
    <circle cx="100" cy="100" r="84" fill="none" stroke="#a87fff" stroke-width="1" opacity="0.4"/>

    <!-- 8 spokes -->
    <line x1="100" y1="12" x2="100" y2="188" stroke="#a87fff" stroke-width="2" opacity="0.7"/>
    <line x1="12" y1="100" x2="188" y2="100" stroke="#a87fff" stroke-width="2" opacity="0.7"/>
    <line x1="37.8" y1="37.8" x2="162.2" y2="162.2" stroke="#3fcfcf" stroke-width="2" opacity="0.6"/>
    <line x1="162.2" y1="37.8" x2="37.8" y2="162.2" stroke="#3fcfcf" stroke-width="2" opacity="0.6"/>

    <!-- Inner ring -->
    <circle cx="100" cy="100" r="30" fill="none" stroke="#ff4656" stroke-width="2" opacity="0.5"/>

    <!-- Inner spokes short -->
    <line x1="100" y1="70" x2="100" y2="12" stroke="#ff4656" stroke-width="1.5" opacity="0.4"/>
    <line x1="100" y1="130" x2="100" y2="188" stroke="#ff4656" stroke-width="1.5" opacity="0.4"/>
    <line x1="70" y1="100" x2="12" y2="100" stroke="#ff4656" stroke-width="1.5" opacity="0.4"/>
    <line x1="130" y1="100" x2="188" y2="100" stroke="#ff4656" stroke-width="1.5" opacity="0.4"/>

    <!-- Gondolas — 8 cabins on outer ring -->
    <!-- Top -->
    <rect x="91" y="5" width="18" height="14" rx="3" fill="#ff4656"/>
    <!-- Top-right -->
    <rect x="153" y="33" width="18" height="14" rx="3" fill="#a87fff"/>
    <!-- Right -->
    <rect x="181" y="93" width="18" height="14" rx="3" fill="#3fcfcf"/>
    <!-- Bottom-right -->
    <rect x="153" y="153" width="18" height="14" rx="3" fill="#ff4656"/>
    <!-- Bottom -->
    <rect x="91" y="181" width="18" height="14" rx="3" fill="#a87fff"/>
    <!-- Bottom-left -->
    <rect x="29" y="153" width="18" height="14" rx="3" fill="#3fcfcf"/>
    <!-- Left -->
    <rect x="1" y="93" width="18" height="14" rx="3" fill="#ff4656"/>
    <!-- Top-left -->
    <rect x="29" y="33" width="18" height="14" rx="3" fill="#a87fff"/>

    <!-- Center hub -->
    <circle cx="100" cy="100" r="10" fill="#ff4656"/>
    <circle cx="100" cy="100" r="6" fill="#a87fff"/>
    <circle cx="100" cy="100" r="3" fill="#fff"/>
  </g>
</svg>
